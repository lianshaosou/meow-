name: Ops Alert Checks

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  run-alert-checks:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_OPS_ALERT_CHECKS == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Validate ops alert config
        id: config
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
        run: |
          if [[ -z "${SUPABASE_ACCESS_TOKEN}" || -z "${STAGING_PROJECT_REF}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ops alert checks: missing Supabase config"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: steps.config.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: steps.config.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
        run: supabase link --project-ref "$STAGING_PROJECT_REF"

      - name: Run consolidated alert checks
        id: alert_check
        if: steps.config.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
          OPS_ALERT_WEBHOOK_URL: ${{ secrets.OPS_ALERT_WEBHOOK_URL }}
        run: bash backend/live_ops/run_ops_alert_checks.sh

      - name: Create GitHub incident issue
        if: steps.alert_check.outputs.alert_active == 'true' && vars.CREATE_GITHUB_INCIDENT_ON_ALERT == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fingerprint = `${{ steps.alert_check.outputs.alert_fingerprint || '' }}`
            const marker = `alert_fingerprint: ${fingerprint}`
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,ops-alert',
              per_page: 100
            })

            const duplicate = existing.data.find(issue => issue.body?.includes(marker))
            if (duplicate) {
              console.log(`Skipping GitHub incident create; duplicate open issue #${duplicate.number}`)
              return
            }

            const title = `[Ops Alert] Meow alert checks active (${new Date().toISOString()})`
            const payload = `${{ toJson(steps.alert_check.outputs.alert_payload) || '{}' }}`
            const body = [
              'Automated ops alert checks detected one or more active alerts.',
              '',
              'Workflow: `.github/workflows/ops-alert-checks.yml`',
              'Runbook: `backend/live_ops/ANALYTICS_ALERT_RUNBOOK.md`',
              '',
              'Alert payload:',
              '```json',
              payload,
              '```',
              '',
              marker
            ].join('\n')
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['incident', 'ops-alert']
            })

      - name: Create Jira incident issue
        if: steps.alert_check.outputs.alert_active == 'true' && vars.CREATE_JIRA_INCIDENT_ON_ALERT == 'true'
        continue-on-error: true
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
          JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE }}
          ALERT_PAYLOAD: ${{ steps.alert_check.outputs.alert_payload }}
          ALERT_FINGERPRINT: ${{ steps.alert_check.outputs.alert_fingerprint }}
        run: |
          if [[ -z "${JIRA_BASE_URL}" || -z "${JIRA_USER_EMAIL}" || -z "${JIRA_API_TOKEN}" || -z "${JIRA_PROJECT_KEY}" ]]; then
            echo "Skipping Jira issue creation: missing Jira config"
            exit 0
          fi

          if [[ -z "${ALERT_FINGERPRINT}" ]]; then
            echo "Skipping Jira issue creation: missing alert fingerprint"
            exit 0
          fi

          search_response="$(curl -fsS -G "${JIRA_BASE_URL}/rest/api/2/search" \
            -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            --data-urlencode "jql=project = ${JIRA_PROJECT_KEY} AND statusCategory != Done AND text ~ \"alert_fingerprint: ${ALERT_FINGERPRINT}\"" \
            --data-urlencode "maxResults=1" \
            --data-urlencode "fields=key")"

          existing_total="$(echo "${search_response}" | jq '.total // 0')"
          if [[ "${existing_total}" != "0" ]]; then
            echo "Skipping Jira issue creation: duplicate open issue exists"
            exit 0
          fi

          summary="[Ops Alert] Meow alert checks active ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
          issue_type="${JIRA_ISSUE_TYPE:-Incident}"
          description=$'Automated ops alert checks detected one or more active alerts.\n\nWorkflow: .github/workflows/ops-alert-checks.yml\nRunbook: backend/live_ops/ANALYTICS_ALERT_RUNBOOK.md\n\nAlert payload:\n'
          description+="${ALERT_PAYLOAD}"
          description+=$'\n\n'
          description+="alert_fingerprint: ${ALERT_FINGERPRINT}"

          request_body="$(jq -n \
            --arg projectKey "${JIRA_PROJECT_KEY}" \
            --arg summary "${summary}" \
            --arg description "${description}" \
            --arg issueType "${issue_type}" \
            '{fields:{project:{key:$projectKey},summary:$summary,description:$description,issuetype:{name:$issueType}}}')"

          curl -fsS -X POST "${JIRA_BASE_URL}/rest/api/2/issue" \
            -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${request_body}" >/dev/null

          echo "Created Jira incident issue"
