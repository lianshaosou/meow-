name: Live Tuning Review

on:
  schedule:
    - cron: "15 3 * * 2"
  workflow_dispatch:

jobs:
  run-live-tuning-review:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_LIVE_TUNING_REVIEW == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Validate live tuning config
        id: config
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
        run: |
          if [[ -z "${SUPABASE_ACCESS_TOKEN}" || -z "${STAGING_PROJECT_REF}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping live tuning review: missing Supabase config"
          elif [[ "${SUPABASE_ACCESS_TOKEN}" != sbp_* ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping live tuning review: SUPABASE_ACCESS_TOKEN is not a Supabase personal access token"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: steps.config.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: steps.config.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
        run: supabase link --project-ref "$STAGING_PROJECT_REF"

      - name: Run live tuning review
        if: steps.config.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
        run: |
          supabase db query --linked --workdir . --output json -f backend/analytics/live_tuning_review_queries.sql
          supabase db query --linked --workdir . --output json -f backend/analytics/ops_alert_checks.sql
