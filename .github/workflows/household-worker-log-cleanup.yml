name: Household Worker Log Cleanup

on:
  schedule:
    - cron: "45 2 * * 1"
  workflow_dispatch:

jobs:
  cleanup-validation-worker-logs:
    if: vars.ENABLE_HOUSEHOLD_VALIDATION_LOG_CLEANUP == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Cleanup validation worker logs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
          RETENTION_DAYS: ${{ vars.HOUSEHOLD_VALIDATION_LOG_RETENTION_DAYS || '3' }}
        run: bash backend/live_ops/run_household_worker_run_log_cleanup.sh
