name: Household Worker Log Cleanup

on:
  schedule:
    - cron: "45 2 * * 1"
  workflow_dispatch:

jobs:
  cleanup-validation-worker-logs:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_HOUSEHOLD_VALIDATION_LOG_CLEANUP == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Validate cleanup config
        id: config
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
        run: |
          if [[ -z "${SUPABASE_ACCESS_TOKEN}" || -z "${STAGING_PROJECT_REF}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping household worker log cleanup: missing Supabase config"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.config.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: steps.config.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: steps.config.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
        run: supabase link --project-ref "$STAGING_PROJECT_REF"

      - name: Cleanup validation worker logs
        if: steps.config.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ vars.STAGING_PROJECT_REF }}
          RETENTION_DAYS: ${{ vars.HOUSEHOLD_VALIDATION_LOG_RETENTION_DAYS || '3' }}
        run: bash backend/live_ops/run_household_worker_run_log_cleanup.sh
